name = "kakeibo-api"
main = "src/index.ts"
compatibility_date = "2024-04-01"

# Cron Triggers: 毎日 09:00 JST (= 00:00 UTC) に実行
[triggers]
crons = ["0 0 * * *"]

# Workers環境設定
[env.production]
workers_dev = false
routes = []

# ローカル開発用の設定例
# .dev.vars ファイルで環境変数を定義してください
# NOTION_TOKEN=secret_xxx
# API_KEY=your_api_key

# 本番環境の環境変数は wrangler secret コマンドで設定
# wrangler secret put NOTION_TOKEN
# wrangler secret put API_KEY

# Notion DB IDs (非機密情報なのでここに記載可)
